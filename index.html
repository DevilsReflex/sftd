<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<title>Stick Figure Tower Defense</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Outfit:wght@400;600;700;800&display=swap');
:root{
  --bg:#1a1a2e;--bg2:#16213e;--accent:#e94560;--gold:#f5c842;--green:#4ecca3;
  --blue:#3498db;--purple:#9b59b6;--orange:#e67e22;--red:#e74c3c;
  --text:#eee;--dim:#888;--panel:rgba(0,0,0,0.7);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Outfit',sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;touch-action:none;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
canvas{display:block;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#ui>*{pointer-events:auto;}

/* MENU */
#menu{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);z-index:100;}
#menu h1{font-family:'Bangers','Comic Sans MS','Comic Sans','Trebuchet MS',cursive,sans-serif;font-size:clamp(3rem,8vw,6rem);color:var(--gold);text-shadow:4px 4px 0 #000,0 0 30px rgba(245,200,66,0.3);letter-spacing:4px;margin-bottom:8px;}
#menu .subtitle{font-size:clamp(1rem,2.5vw,1.4rem);color:var(--dim);margin-bottom:40px;font-weight:600;}
.btn{font-family:'Outfit',sans-serif;font-weight:700;font-size:clamp(1rem,2vw,1.2rem);padding:14px 40px;border:none;border-radius:12px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:2px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 15px rgba(233,69,96,0.4);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(233,69,96,0.6);}
.btn-gold{background:var(--gold);color:#1a1a2e;box-shadow:0 4px 15px rgba(245,200,66,0.4);}
.btn-back{background:rgba(255,255,255,0.1);color:var(--text);font-size:0.9rem;padding:10px 24px;}

/* LEVEL SELECT */
#levelSelect{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;background:var(--bg);z-index:90;overflow-y:auto;padding:20px;}
#levelSelect h2{font-family:'Bangers','Comic Sans MS','Comic Sans','Trebuchet MS',cursive,sans-serif;font-size:2.5rem;color:var(--gold);margin:20px 0 30px;}
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:900px;width:100%;padding:0 20px 100px;}
.level-card{background:var(--bg2);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
.level-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 30px rgba(245,200,66,0.2);}
.level-card h3{font-family:'Bangers','Comic Sans MS','Comic Sans','Trebuchet MS',cursive,sans-serif;font-size:1.6rem;color:var(--gold);margin-bottom:6px;}
.level-card p{color:var(--dim);font-size:0.9rem;margin-bottom:12px;}
.level-card canvas{width:100%;height:140px;border-radius:8px;background:#2a4a3a;margin-bottom:10px;}
.diff-btns{display:flex;gap:8px;}
.diff-btn{flex:1;padding:8px;border:2px solid;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.85rem;text-align:center;background:transparent;transition:all 0.2s;font-family:'Outfit',sans-serif;}
.diff-btn.easy{border-color:var(--green);color:var(--green);}
.diff-btn.easy:hover,.diff-btn.easy.sel{background:var(--green);color:#000;}
.diff-btn.med{border-color:var(--gold);color:var(--gold);}
.diff-btn.med:hover,.diff-btn.med.sel{background:var(--gold);color:#000;}
.diff-btn.hard{border-color:var(--accent);color:var(--accent);}
.diff-btn.hard:hover,.diff-btn.hard.sel{background:var(--accent);color:#fff;}

/* GAME HUD */
#gameUI{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:50;}
#topBar{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,0.8) 0%,transparent 100%);}
#topBar .stat{display:flex;align-items:center;gap:6px;font-weight:700;font-size:clamp(0.9rem,2vw,1.1rem);}
#topBar .stat .icon{font-size:1.2em;}
.lives{color:var(--accent);}
.coins{color:var(--gold);}
.wave-info{color:var(--green);}
#topBar .btn-back{padding:6px 16px;font-size:0.8rem;border-radius:8px;}

#hotbar{position:absolute;bottom:0;left:0;width:100%;display:flex;align-items:end;justify-content:center;padding:8px 12px 12px;gap:6px;background:linear-gradient(0deg,rgba(0,0,0,0.85) 0%,transparent 100%);overflow-x:auto;box-sizing:border-box;}
.unit-slot{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:all 0.2s;padding:6px;border-radius:10px;border:2px solid transparent;min-width:54px;}
.unit-slot:hover{border-color:var(--gold);background:rgba(245,200,66,0.1);cursor:grab;}
.unit-slot:active{cursor:grabbing;}
.unit-slot.selected{border-color:var(--gold);background:rgba(245,200,66,0.2);transform:translateY(-4px);}
.unit-slot.locked{opacity:0.4;cursor:not-allowed;}
.unit-icon{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin-bottom:4px;}
.unit-cost{font-size:0.75rem;font-weight:700;color:var(--gold);}
.unit-name{font-size:0.65rem;color:var(--dim);white-space:nowrap;}

/* UPGRADE PANEL */
#upgradePanel{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:var(--panel);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:16px;width:220px;display:none;z-index:60;}
#upgradePanel .up-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#upgradePanel .up-header h3{font-family:'Bangers','Comic Sans MS','Comic Sans','Trebuchet MS',cursive,sans-serif;color:var(--gold);font-size:1.3rem;}
#upgradePanel .stat-row{display:flex;justify-content:space-between;margin:3px 0;font-size:0.82rem;}
#upgradePanel .stat-val{color:var(--green);font-weight:700;}
#upgradePanel .up-section-label{font-size:0.68rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin:10px 0 5px;}
#upgradePanel hr{border:none;border-top:1px solid rgba(255,255,255,0.1);margin:8px 0;}
.upgrade-btn{width:100%;margin-top:6px;padding:9px 10px;border:none;border-radius:8px;cursor:pointer;font-weight:700;font-family:'Outfit',sans-serif;font-size:0.82rem;text-align:left;transition:opacity 0.15s;}
.upgrade-btn:disabled{opacity:0.4;cursor:not-allowed;}
.upg-dmg{background:#c0392b;color:#fff;}
.upg-range{background:#27ae60;color:#fff;}
.upg-rate{background:#2980b9;color:#fff;}
.sell-btn{background:var(--accent);color:#fff;text-align:center;}
.upg-prestige{background:linear-gradient(135deg,#7a5c00,#c8a820,#7a5c00);color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.6);border:1px solid #f5c842;}
.upg-prestige:not(:disabled):hover{filter:brightness(1.2);}

/* WAVE ANNOUNCE */
#waveAnnounce{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-family:'Bangers','Comic Sans MS','Comic Sans','Trebuchet MS',cursive,sans-serif;font-size:3rem;color:var(--gold);text-shadow:3px 3px 0 #000;opacity:0;transition:opacity 0.5s;pointer-events:none;z-index:70;white-space:nowrap;}

/* WIN/LOSE */
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:80;backdrop-filter:blur(5px);}
#overlay h2{font-family:'Bangers','Comic Sans MS','Comic Sans','Trebuchet MS',cursive,sans-serif;font-size:3.5rem;margin-bottom:10px;}
#overlay p{color:var(--dim);font-size:1.1rem;margin-bottom:30px;}
#overlay .btn{margin:6px;}

/* SPEED BUTTON */
#speedBtn{position:absolute;top:8px;right:50%;transform:translateX(50%);padding:6px 18px;border-radius:20px;border:2px solid var(--green);background:transparent;color:var(--green);font-weight:700;font-size:0.9rem;cursor:pointer;font-family:'Outfit',sans-serif;z-index:55;}
#speedBtn:hover{background:var(--green);color:#000;}

/* START WAVE BUTTON */
#startWaveBtn{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:55;}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<div id="ui">
  <!-- MAIN MENU -->
  <div id="menu">
    <h1>SFTD</h1>
    <div class="subtitle">Stick Figure Tower Defense</div>
    <button class="btn btn-primary" onclick="showLevelSelect()">PLAY</button>
  </div>

  <!-- LEVEL SELECT -->
  <div id="levelSelect">
    <button class="btn btn-back" onclick="showMenu()" style="align-self:flex-start;margin:10px;">← Back</button>
    <h2>Select Level</h2>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <!-- GAME HUD -->
  <div id="gameUI">
    <div id="topBar">
      <button class="btn btn-back" onclick="exitToLevels()">← EXIT</button>
      <div class="stat lives"><span class="icon">❤️</span><span id="livesNum">20</span></div>
      <div class="stat coins"><span class="icon">🪙</span><span id="coinsNum">650</span></div>
      <div class="stat wave-info"><span id="waveNum">Wave 1/10</span></div>
    </div>
    <div id="hotbar"></div>
    <div id="waveAnnounce"></div>
    <button id="startWaveBtn" class="btn btn-gold" onclick="startNextWave()">▶ START WAVE</button>
    <button id="speedBtn" onclick="toggleSpeed()">1x</button>
    <div id="upgradePanel">
      <div class="up-header">
        <span id="upIcon" style="font-size:1.4rem">🔫</span>
        <h3 id="upName">Unit</h3>
      </div>
      <div class="stat-row"><span>Damage</span><span class="stat-val" id="upDmg">5</span></div>
      <div class="stat-row"><span>Range</span><span class="stat-val" id="upRng">100</span></div>
      <div class="stat-row"><span>Fire Rate</span><span class="stat-val" id="upSpd">1.0/s</span></div>
      <hr>
      <div class="up-section-label">Type Upgrades · affects all units</div>
      <button class="upgrade-btn upg-dmg" id="upDmgBtn" onclick="upgradeTypeStat('dmg')">⚔ Damage</button>
      <button class="upgrade-btn upg-range" id="upRangeBtn" onclick="upgradeTypeStat('range')">📡 Range</button>
      <button class="upgrade-btn upg-rate" id="upRateBtn" onclick="upgradeTypeStat('rate')">⚡ Fire Rate</button>
      <div id="upPrestigeSection" style="display:none">
        <hr>
        <div class="up-section-label">Evolution · transforms appearance + boosts all stats</div>
        <button class="upgrade-btn upg-prestige" id="upPrestigeBtn" onclick="upgradePrestige()">✦ Evolution</button>
      </div>
      <hr>
      <button class="upgrade-btn sell-btn" onclick="sellSelected()">Sell Unit - $0</button>
      <button class="btn btn-back" style="width:100%;margin-top:6px;font-size:0.8rem;" onclick="deselectUnit()">Close</button>
    </div>
  </div>

  <!-- WIN/LOSE OVERLAY -->
  <div id="overlay">
    <h2 id="olTitle">Victory!</h2>
    <p id="olSub">You survived all waves!</p>
    <button class="btn btn-gold" onclick="exitToLevels()">Level Select</button>
    <button class="btn btn-primary" onclick="retryLevel()">Play Again</button>
  </div>
</div>

<script>
// ===== CANVAS SETUP =====
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, scale = 1;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  scale = Math.min(W / 1200, H / 800);
}
window.addEventListener('resize', resize);
resize();

// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    if(typeof r === 'number') r = [r,r,r,r];
    if(!Array.isArray(r)) r = [0,0,0,0];
    const [tl,tr,br,bl] = r;
    this.moveTo(x+tl, y);
    this.lineTo(x+w-tr, y); this.arcTo(x+w,y,x+w,y+tr,tr);
    this.lineTo(x+w, y+h-br); this.arcTo(x+w,y+h,x+w-br,y+h,br);
    this.lineTo(x+bl, y+h); this.arcTo(x,y+h,x,y+h-bl,bl);
    this.lineTo(x, y+tl); this.arcTo(x,y,x+tl,y,tl);
    this.closePath();
  };
}

// ===== TYPE UPGRADE SYSTEM =====
// Costs to purchase each successive level of a stat upgrade (per type)
const STAT_UP_COSTS = [75, 140, 230, 350, 500];
const MAX_STAT_LEVEL = 5;
const PRESTIGE_COSTS = [600, 1200, 2000];
const MAX_PRESTIGE_LEVEL = 3;
const PRESTIGE_UNLOCK_THRESHOLD = 5; // total stat upgrades needed to unlock Evolution

// Tracks how many stat upgrades each tower type has purchased
let typeUpgrades = {};

function initTypeUpgrades() {
  typeUpgrades = {};
  TOWER_DEFS.forEach(def => {
    typeUpgrades[def.id] = { dmg: 0, range: 0, rate: 0, prestige: 0 };
  });
}

// Returns current stat bonus for a tower based on its type's global upgrades
function getTypeBonus(defId, stat) {
  const def = TOWER_DEFS.find(d => d.id === defId);
  const lvl = typeUpgrades[defId]?.[stat] || 0;
  if(stat === 'dmg')   return lvl * (def.dmgUp[0] || 3);
  if(stat === 'range') return lvl * (def.rangeUp[0] || 10);
  if(stat === 'rate')  return lvl * (def.rateUp[0] || 0.05);
  return 0;
}

// Applies the current global type bonuses to a single tower object
function applyTypeUpgrades(tower) {
  const def = TOWER_DEFS.find(d => d.id === tower.type);
  const prestige = typeUpgrades[tower.type]?.prestige || 0;
  const pm = 1 + prestige * 0.5; // prestige multiplier: 1x / 1.5x / 2x / 2.5x
  tower.dmg      = def.dmg      + getTypeBonus(tower.type, 'dmg') * pm;
  tower.range    = def.range    + getTypeBonus(tower.type, 'range') * pm;
  tower.fireRate = Math.max(0.05, def.fireRate - getTypeBonus(tower.type, 'rate') * pm);
}

let difficulty = 'easy';

let wave = 0;

let enemies = [];
let towers = [];
let turrets = [];

let mouseX = 0, mouseY = 0;
let gameSpeed = 1;
let waveActive = false;
let spawnQueue = [];
let spawnTimer = 0;
let waveAnnounceTimer = 0;
let gameTime = 0;

    dmgUp:[2,3,4,5], rangeUp:[8,10,12,15], rateUp:[0.05,0.07,0.09,0.11]
  }
];

// ===== ENEMY DEFINITIONS =====
function getEnemyTypes(wave, diff) {
  const hpMult = diff === 'easy' ? 1 : diff === 'medium' ? 1.5 : 2.2;
  const spdMult = diff === 'easy' ? 1 : diff === 'medium' ? 1.15 : 1.3;
  const base = [
    {name:'Runner', hp:20+wave*8, speed:(55+wave*2)*spdMult, radius:8, color:'#e74c3c', reward:7, bodyType:'thin'},
    {name:'Walker', hp:35+wave*15, speed:(40+wave*1.5)*spdMult, radius:10, color:'#e67e22', reward:11, bodyType:'normal'},
    {name:'Tank', hp:80+wave*30, speed:(28+wave)*spdMult, radius:14, color:'#8e44ad', reward:20, bodyType:'heavy'},
    {name:'Sprinter', hp:12+wave*5, speed:(80+wave*3)*spdMult, radius:7, color:'#2ecc71', reward:6, bodyType:'thin'},
    {name:'Boss', hp:200+wave*80, speed:(22+wave*0.5)*spdMult, radius:18, color:'#c0392b', reward:65, bodyType:'boss'}
  ];
  base.forEach(e => e.hp = Math.floor(e.hp * hpMult));
  return base;
}

function generateWaveEnemies(wave, diff) {
  const types = getEnemyTypes(wave, diff);
  const countMult = diff === 'easy' ? 1 : diff === 'medium' ? 1.4 : 1.9;
  let list = [];
  const baseCount = Math.floor((5 + wave * 3) * countMult);
  
  for(let i = 0; i < baseCount; i++) {
    let r = Math.random();
    let type;
    if(wave < 3) {
      type = r < 0.6 ? types[0] : r < 0.85 ? types[3] : types[1];
    } else if(wave < 6) {
      type = r < 0.35 ? types[0] : r < 0.55 ? types[1] : r < 0.8 ? types[3] : types[2];
    } else {
      type = r < 0.2 ? types[0] : r < 0.4 ? types[1] : r < 0.55 ? types[2] : r < 0.8 ? types[3] : types[2];
    }
    list.push({...type, delay: i * (0.6 - wave * 0.02)});
  }
  // Boss every 5 waves
  if(wave % 5 === 0 && wave > 0) {
    const bossCount = Math.floor(wave / 5);
    for(let i = 0; i < bossCount; i++) {
      list.push({...types[4], delay: list.length * 0.5});
    }
  }
  return list;
}

// ===== PATH HELPERS =====
function getGameArea() {
  const barTop = 50;
  const barBot = 90;
  const areaW = W;
  const areaH = H - barTop - barBot;
  return {x: 0, y: barTop, w: areaW, h: areaH};
}

function getPixelPath(level) {
  const area = getGameArea();
  return level.path.map(p => ({
    x: area.x + p.x * area.w,
    y: area.y + p.y * area.h
  }));
}

function getPathLength(path) {
  let len = 0;
  for(let i = 1; i < path.length; i++) {
    let dx = path[i].x - path[i-1].x;
    let dy = path[i].y - path[i-1].y;
    len += Math.sqrt(dx*dx + dy*dy);
  }
  return len;
}

function getPosOnPath(path, dist) {
  let traveled = 0;
  for(let i = 1; i < path.length; i++) {
    let dx = path[i].x - path[i-1].x;
    let dy = path[i].y - path[i-1].y;
    let seg = Math.sqrt(dx*dx + dy*dy);
    if(traveled + seg >= dist) {
      let t = (dist - traveled) / seg;
      return {
        x: path[i-1].x + dx * t,
        y: path[i-1].y + dy * t,
        angle: Math.atan2(dy, dx)
      };
    }
    traveled += seg;
  }
  return {x: path[path.length-1].x, y: path[path.length-1].y, angle: 0};
}

function distToPath(px, py, path) {
  let minD = Infinity;
  for(let i = 1; i < path.length; i++) {
    let d = distToSegment(px, py, path[i-1].x, path[i-1].y, path[i].x, path[i].y);
    if(d < minD) minD = d;
  }
  return minD;
}

function distToSegment(px, py, x1, y1, x2, y2) {
  let dx = x2 - x1, dy = y2 - y1;
  let t = Math.max(0, Math.min(1, ((px-x1)*dx + (py-y1)*dy) / (dx*dx + dy*dy)));
  let cx = x1 + t*dx, cy = y1 + t*dy;
  return Math.sqrt((px-cx)*(px-cx) + (py-cy)*(py-cy));
}

function canPlace(x, y, path) {
  const pathW = Math.max(20, Math.min(W, H) * 0.035);
  if(distToPath(x, y, path) < pathW + 20) return false;
  for(let t of towers) {
    let dx = t.x - x, dy = t.y - y;
    if(Math.sqrt(dx*dx+dy*dy) < 30) return false;
  }
  const area = getGameArea();
  if(y < area.y + 5 || y > area.y + area.h - 5) return false;
  return true;
}

// ===== STICK FIGURE DRAWING — Reference Art Style =====
// Thick black outlines, white-filled round head, curved-line eyes,
// hair tuft, loopy hands, brown shoes, organic curves per unit type.

function drawStickFigure(x, y, r, color, angle, type, weapon, tier) {
  tier = tier || 0;
  ctx.save();
  ctx.translate(x, y);
  // Prestige units grow slightly larger
  const rScale = 1 + tier * 0.07;
  r = r * rScale;
  const s = r / 10;
  const lw = Math.max(2, 2.8 * s); // thick outlines like the reference
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // Tier 3 outer aura ring
  if(tier === 3 && weapon) {
    const auraR = r * 3.2;
    const pulse = 0.55 + 0.35 * Math.sin((gameTime||0) * 4);
    ctx.globalAlpha = pulse * 0.22;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -r * 0.8, auraR, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = pulse * 0.55;
    ctx.beginPath();
    ctx.arc(0, -r * 0.8, auraR * 0.78, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // Tier 2 energy ring
  if(tier === 2 && weapon) {
    const pulse = 0.5 + 0.4 * Math.sin((gameTime||0) * 3);
    ctx.globalAlpha = pulse * 0.18;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, -r * 0.8, r * 2.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Walking animation phase
  const t = (gameTime || 0) * 3 + x * 0.1;
  const walkCycle = Math.sin(t);
  const isEnemy = !weapon; // enemies don't hold weapons
  const lean = isEnemy ? 0.08 : 0; // enemies lean forward slightly

  ctx.rotate(lean);

  // === DETERMINE BODY PROPORTIONS BY TYPE ===
  let headR = 5 * s;
  let neckLen = 2.5 * s;
  let bodyLen = 9 * s;
  let legLen = 8 * s;
  let armLen = 7 * s;
  let shoeW = 4 * s, shoeH = 2.5 * s;
  let bodyThick = lw;

  if(type === 'heavy') { headR = 6*s; bodyLen = 10*s; legLen = 7*s; bodyThick = lw*1.4; shoeW = 5*s; }
  if(type === 'boss') { headR = 7.5*s; bodyLen = 11*s; legLen = 9*s; bodyThick = lw*1.6; shoeW = 6*s; shoeH = 3*s; }
  if(type === 'thin') { headR = 4*s; bodyLen = 7*s; legLen = 7*s; }

  const headY = -(neckLen + bodyLen + headR);
  const shoulderY = -(bodyLen);
  const hipY = 0;

  // === LEGS WITH BROWN SHOES ===
  const legSpreadL = isEnemy ? walkCycle * 3 * s : -2.5 * s;
  const legSpreadR = isEnemy ? -walkCycle * 3 * s : 2.5 * s;
  const footLX = legSpreadL - 2*s;
  const footRX = legSpreadR + 2*s;
  const footY = legLen;

  // Left leg
  ctx.strokeStyle = '#222';
  ctx.lineWidth = bodyThick;
  ctx.beginPath();
  ctx.moveTo(0, hipY);
  ctx.quadraticCurveTo(footLX * 0.3, hipY + legLen * 0.5, footLX, hipY + footY);
  ctx.stroke();
  // Left shoe
  ctx.fillStyle = '#8B5E3C';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.7;
  ctx.beginPath();
  ctx.ellipse(footLX, hipY + footY + shoeH*0.2, shoeW*0.55, shoeH*0.55, -0.15, 0, Math.PI);
  ctx.fill(); ctx.stroke();

  // Right leg
  ctx.strokeStyle = '#222';
  ctx.lineWidth = bodyThick;
  ctx.beginPath();
  ctx.moveTo(0, hipY);
  ctx.quadraticCurveTo(footRX * 0.3, hipY + legLen * 0.5, footRX, hipY + footY);
  ctx.stroke();
  // Right shoe
  ctx.fillStyle = '#8B5E3C';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.7;
  ctx.beginPath();
  ctx.ellipse(footRX, hipY + footY + shoeH*0.2, shoeW*0.55, shoeH*0.55, 0.15, 0, Math.PI);
  ctx.fill(); ctx.stroke();

  // === BODY (slight curve) ===
  ctx.strokeStyle = '#222';
  ctx.lineWidth = bodyThick;
  ctx.beginPath();
  ctx.moveTo(0, hipY);
  ctx.quadraticCurveTo(0.8*s, shoulderY + bodyLen*0.5, 0, shoulderY);
  ctx.stroke();

  // === ARMS & HANDS ===
  if(weapon) {
    drawTowerArms(s, lw, shoulderY, armLen, angle, weapon, color, type);
  } else {
    // Enemy walking arms - swinging
    const armSwing = walkCycle * 2.5 * s;
    // Left arm
    ctx.strokeStyle = '#222';
    ctx.lineWidth = lw * 0.85;
    ctx.beginPath();
    ctx.moveTo(0, shoulderY + 1.5*s);
    ctx.quadraticCurveTo(-armLen*0.4, shoulderY + armLen*0.4 + armSwing, -armLen*0.5, shoulderY + armLen*0.7 + armSwing);
    ctx.stroke();
    drawLoopyHand(-armLen*0.5, shoulderY + armLen*0.7 + armSwing, s);

    // Right arm
    ctx.beginPath();
    ctx.moveTo(0, shoulderY + 1.5*s);
    ctx.quadraticCurveTo(armLen*0.4, shoulderY + armLen*0.4 - armSwing, armLen*0.5, shoulderY + armLen*0.7 - armSwing);
    ctx.stroke();
    drawLoopyHand(armLen*0.5, shoulderY + armLen*0.7 - armSwing, s);
  }

  // === NECK ===
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.8;
  ctx.beginPath();
  ctx.moveTo(0, shoulderY);
  ctx.lineTo(0, headY + headR);
  ctx.stroke();

  // === HEAD (white filled circle with thick outline) ===
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 1.1;
  ctx.beginPath();
  ctx.arc(0, headY, headR, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // === EYES (curved lines like the reference) ===
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.65;
  const eyeOff = headR * 0.22;
  const eyeH = headR * 0.35;
  // Left eye
  ctx.beginPath();
  ctx.arc(-eyeOff, headY - headR*0.05, eyeH, -0.6, 0.6);
  ctx.stroke();
  // Right eye
  ctx.beginPath();
  ctx.arc(eyeOff + headR*0.15, headY - headR*0.05, eyeH, -0.6, 0.6);
  ctx.stroke();

  // === MOUTH (small smile) ===
  ctx.lineWidth = lw * 0.45;
  ctx.beginPath();
  ctx.arc(headR*0.1, headY + headR*0.3, headR*0.22, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // === HAIR TUFT ===
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.7;
  ctx.beginPath();
  ctx.moveTo(-headR*0.1, headY - headR);
  ctx.quadraticCurveTo(headR*0.05, headY - headR - 3*s, headR*0.25, headY - headR + 0.5*s);
  ctx.stroke();

  // === HEADGEAR / ACCESSORIES per unit type ===
  drawHeadgear(type, weapon, headY, headR, s, lw, color, tier);

  // === BOSS CROWN / HEAVY ARMOR MARKS ===
  if(type === 'boss') {
    drawCrown(headY, headR, s, lw);
  }
  if(type === 'heavy') {
    // Armor cross-hatches on body
    ctx.strokeStyle = '#555';
    ctx.lineWidth = lw * 0.4;
    for(let i = 0; i < 3; i++) {
      const yy = shoulderY + 2*s + i * 3*s;
      ctx.beginPath();
      ctx.moveTo(-2.5*s, yy); ctx.lineTo(2.5*s, yy);
      ctx.stroke();
    }
  }

  // === TIER 2+ CHEST ARMOR PLATE ===
  if(tier >= 2 && weapon) {
    const armorColor = tier === 3 ? shadeColor(color, 20) : '#778899';
    ctx.fillStyle = armorColor;
    ctx.strokeStyle = '#222';
    ctx.lineWidth = lw * 0.55;
    ctx.beginPath();
    ctx.roundRect(-2.8*s, shoulderY + 1*s, 5.6*s, 5*s, 1*s);
    ctx.fill(); ctx.stroke();
    // Chest stripe
    ctx.strokeStyle = tier === 3 ? '#fff' : color;
    ctx.lineWidth = lw * 0.4;
    ctx.globalAlpha = 0.7;
    ctx.beginPath();
    ctx.moveTo(0, shoulderY + 1.5*s); ctx.lineTo(0, shoulderY + 5.5*s);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === TIER 3 GLOWING BOOT OUTLINES ===
  if(tier === 3 && weapon) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lw * 0.6;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.ellipse(footLX, hipY+footY+shoeH*0.2, shoeW*0.62, shoeH*0.62, -0.15, 0, Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(footRX, hipY+footY+shoeH*0.2, shoeW*0.62, shoeH*0.62, 0.15, 0, Math.PI);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // === COLOR ACCENT (team color band on body) ===
  if(color && color !== '#222') {
    if(tier < 2) {
      // Regular color band
      ctx.strokeStyle = color;
      ctx.lineWidth = lw * 0.6;
      ctx.beginPath();
      ctx.moveTo(-2.5*s, shoulderY + 2*s);
      ctx.lineTo(2.5*s, shoulderY + 2*s);
      ctx.stroke();
    }
    // Colored shoe tint overlay
    ctx.globalAlpha = tier >= 2 ? 0.6 : 0.35;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.ellipse(footLX, hipY+footY+shoeH*0.2, shoeW*0.5, shoeH*0.45, 0, 0, Math.PI);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(footRX, hipY+footY+shoeH*0.2, shoeW*0.5, shoeH*0.45, 0, 0, Math.PI);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ===== LOOPY HAND (oval loop like the reference) =====
function drawLoopyHand(hx, hy, s) {
  ctx.strokeStyle = '#222';
  ctx.lineWidth = Math.max(1.2, 1.6*s);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(hx, hy, 2*s, 1.5*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.stroke();
}

// ===== TOWER ARMS WITH WEAPONS =====
function drawTowerArms(s, lw, shoulderY, armLen, aimAngle, weapon, color, type) {
  const a = aimAngle || 0;
  const cosA = Math.cos(a), sinA = Math.sin(a);

  // Front arm (holds weapon, aims toward target)
  const frontArmEndX = cosA * armLen * 0.65;
  const frontArmEndY = shoulderY + 2*s + sinA * armLen * 0.65;

  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.85;
  ctx.beginPath();
  ctx.moveTo(0, shoulderY + 1.5*s);
  ctx.quadraticCurveTo(frontArmEndX * 0.4, (shoulderY + 1.5*s + frontArmEndY) * 0.5, frontArmEndX, frontArmEndY);
  ctx.stroke();

  // Draw weapon at arm end
  drawWeaponNew(frontArmEndX, frontArmEndY, s, lw, weapon, color, a);

  // Back arm (hanging or bracing)
  const backX = -cosA * armLen * 0.35;
  const backY = shoulderY + armLen * 0.55;
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.8;
  ctx.beginPath();
  ctx.moveTo(0, shoulderY + 1.5*s);
  ctx.quadraticCurveTo(backX * 0.5, (shoulderY + backY) * 0.5, backX, backY);
  ctx.stroke();
  drawLoopyHand(backX, backY, s);
}

// ===== WEAPON DRAWING (thick, hand-drawn style) =====
function drawWeaponNew(wx, wy, s, lw, weapon, color, angle) {
  ctx.save();
  ctx.translate(wx, wy);
  ctx.rotate(angle);

  const wlw = lw * 0.7;

  switch(weapon) {
    case 'pistol': {
      // Small boxy pistol
      ctx.fillStyle = '#555';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw;
      ctx.beginPath();
      ctx.roundRect(-1*s, -1.8*s, 8*s, 3.6*s, 1.2*s);
      ctx.fill(); ctx.stroke();
      // Muzzle
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(7.5*s, 0, 1.2*s, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case 'bow': {
      // Curved bow with string
      ctx.strokeStyle = '#8B4513';
      ctx.lineWidth = wlw * 1.2;
      ctx.beginPath();
      ctx.arc(0, 0, 7*s, -1, 1);
      ctx.stroke();
      // String
      ctx.strokeStyle = '#ddd';
      ctx.lineWidth = wlw * 0.5;
      ctx.beginPath();
      ctx.moveTo(7*s*Math.cos(-1), 7*s*Math.sin(-1));
      ctx.lineTo(-1*s, 0);
      ctx.lineTo(7*s*Math.cos(1), 7*s*Math.sin(1));
      ctx.stroke();
      // Arrow
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw * 0.5;
      ctx.beginPath();
      ctx.moveTo(-2*s, 0); ctx.lineTo(9*s, 0);
      ctx.stroke();
      // Arrowhead
      ctx.fillStyle = '#888';
      ctx.beginPath();
      ctx.moveTo(10*s, 0); ctx.lineTo(8*s, -1.5*s); ctx.lineTo(8*s, 1.5*s);
      ctx.closePath(); ctx.fill();
      break;
    }
    case 'rifle': {
      // Chunky rifle
      ctx.fillStyle = '#666';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw;
      ctx.beginPath();
      ctx.roundRect(-2*s, -1.5*s, 13*s, 3*s, 1*s);
      ctx.fill(); ctx.stroke();
      // Stock
      ctx.fillStyle = '#8B5E3C';
      ctx.beginPath();
      ctx.roundRect(-4*s, -2*s, 4*s, 4*s, 1*s);
      ctx.fill(); ctx.stroke();
      // Muzzle flash hint
      ctx.fillStyle = '#444';
      ctx.beginPath();
      ctx.arc(11.5*s, 0, 1*s, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case 'minigun': {
      // Multi-barrel rotary gun
      ctx.fillStyle = '#555';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw;
      const rot = (gameTime || 0) * 15;
      for(let i = 0; i < 3; i++) {
        const by = Math.sin(rot + i*Math.PI*2/3) * 2*s;
        ctx.beginPath();
        ctx.roundRect(0, by - 0.8*s, 10*s, 1.6*s, 0.5*s);
        ctx.fill(); ctx.stroke();
      }
      // Body
      ctx.fillStyle = '#777';
      ctx.beginPath();
      ctx.roundRect(-3*s, -3*s, 5*s, 6*s, 1.5*s);
      ctx.fill(); ctx.stroke();
      break;
    }
    case 'sniper': {
      // Long barrel + scope
      ctx.fillStyle = '#555';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw;
      ctx.beginPath();
      ctx.roundRect(-2*s, -1*s, 18*s, 2*s, 0.8*s);
      ctx.fill(); ctx.stroke();
      // Scope
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.roundRect(6*s, -3.5*s, 5*s, 2.5*s, 1*s);
      ctx.fill(); ctx.stroke();
      // Scope lens
      ctx.fillStyle = '#4af';
      ctx.beginPath();
      ctx.arc(11.5*s, -2.2*s, 1.2*s, 0, Math.PI*2);
      ctx.fill();
      break;
    }
    case 'rpg': {
      // Rocket tube
      ctx.fillStyle = '#556B2F';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw;
      ctx.beginPath();
      ctx.roundRect(-1*s, -2.5*s, 12*s, 5*s, 2*s);
      ctx.fill(); ctx.stroke();
      // Rocket tip
      ctx.fillStyle = '#c0392b';
      ctx.beginPath();
      ctx.moveTo(12*s, -2*s); ctx.lineTo(15*s, 0); ctx.lineTo(12*s, 2*s);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#222'; ctx.lineWidth = wlw*0.6; ctx.stroke();
      break;
    }
    case 'freeze': {
      // Ice staff/wand
      ctx.strokeStyle = '#8B5E3C';
      ctx.lineWidth = wlw * 1;
      ctx.beginPath();
      ctx.moveTo(-1*s, 0); ctx.lineTo(9*s, 0);
      ctx.stroke();
      // Ice crystal on tip
      ctx.fillStyle = 'rgba(0,210,255,0.7)';
      ctx.strokeStyle = '#00d2ff';
      ctx.lineWidth = wlw * 0.5;
      const cx = 10.5*s;
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(cx, -3.5*s); ctx.lineTo(cx+2.5*s, 0);
      ctx.lineTo(cx, 3.5*s); ctx.lineTo(cx-2.5*s, 0);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      // Sparkles
      ctx.strokeStyle = '#88eeff';
      ctx.lineWidth = wlw*0.35;
      for(let i = 0; i < 4; i++) {
        const sa = i * Math.PI/2 + (gameTime||0)*2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(sa)*2*s, Math.sin(sa)*2*s);
        ctx.lineTo(cx + Math.cos(sa)*4.5*s, Math.sin(sa)*4.5*s);
        ctx.stroke();
      }
      break;
    }
    case 'wrench': {
      // Engineer wrench / tool gun
      ctx.fillStyle = '#888';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw;
      // Handle
      ctx.beginPath();
      ctx.roundRect(-1*s, -1*s, 9*s, 2*s, 0.8*s);
      ctx.fill(); ctx.stroke();
      // Wrench head (open end)
      ctx.fillStyle = '#aaa';
      ctx.beginPath();
      ctx.arc(10*s, 0, 2.8*s, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      // Wrench gap
      ctx.fillStyle = '#222';
      ctx.beginPath();
      ctx.arc(10*s, 0, 1.4*s, 0, Math.PI*2);
      ctx.fill();
      // Small gear tooth nubs at top/bottom
      ctx.fillStyle = '#aaa';
      ctx.strokeStyle = '#222';
      ctx.lineWidth = wlw * 0.6;
      ctx.beginPath();
      ctx.roundRect(8*s, -4*s, 2*s, 1.8*s, 0.4*s);
      ctx.fill(); ctx.stroke();
      ctx.beginPath();
      ctx.roundRect(8*s, 2.2*s, 2*s, 1.8*s, 0.4*s);
      ctx.fill(); ctx.stroke();
      break;
    }
  }
  ctx.restore();
}

// ===== HEADGEAR / ACCESSORIES PER TOWER TYPE =====
function drawHeadgear(type, weapon, headY, headR, s, lw, color, tier) {
  if(!weapon) return; // enemies have no headgear (except boss/heavy handled separately)
  tier = tier || 0;

  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.7;

  switch(weapon) {
    case 'pistol': { // Scout
      if(tier === 0) {
        // T0: Baseball cap
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.05, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = shadeColor(color, -30);
        ctx.beginPath();
        ctx.ellipse(headR*0.5, headY - headR*0.15, headR*0.7, headR*0.2, 0.1, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
      } else if(tier === 1) {
        // T1: Cap with gold brim + side visor stripe
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.05, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#f5c842';
        ctx.beginPath();
        ctx.ellipse(headR*0.5, headY - headR*0.15, headR*0.75, headR*0.22, 0.1, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Gold accent stripe on cap
        ctx.strokeStyle = '#f5c842';
        ctx.lineWidth = lw * 0.5;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.0, Math.PI+0.3, -0.3);
        ctx.stroke();
      } else if(tier === 2) {
        // T2: Tactical combat helmet with ear guards
        ctx.fillStyle = '#445566';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.7;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.18, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        // Helmet rim
        ctx.strokeStyle = color;
        ctx.lineWidth = lw * 0.5;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.22, Math.PI+0.2, -0.2);
        ctx.stroke();
        // Left ear guard
        ctx.fillStyle = '#334';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.55;
        ctx.beginPath();
        ctx.ellipse(-headR*1.1, headY - headR*0.1, headR*0.35, headR*0.5, 0.2, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Right ear guard
        ctx.beginPath();
        ctx.ellipse(headR*1.1, headY - headR*0.1, headR*0.35, headR*0.5, -0.2, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Visor line
        ctx.strokeStyle = color;
        ctx.lineWidth = lw * 0.4;
        ctx.globalAlpha = 0.7;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.25, headR*0.9, Math.PI*1.15, -0.15);
        ctx.stroke();
        ctx.globalAlpha = 1;
      } else {
        // T3: Full cyber helmet with glowing visor
        ctx.fillStyle = '#1a1a2e';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.8;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.25, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        // Outer rim glow
        ctx.strokeStyle = color;
        ctx.lineWidth = lw * 0.7;
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.3, Math.PI, 2*Math.PI);
        ctx.stroke();
        ctx.globalAlpha = 1;
        // Glowing visor strip
        const visorGrad = ctx.createLinearGradient(-headR*0.8, 0, headR*0.8, 0);
        visorGrad.addColorStop(0, 'rgba(0,200,255,0)');
        visorGrad.addColorStop(0.5, 'rgba(0,200,255,0.9)');
        visorGrad.addColorStop(1, 'rgba(0,200,255,0)');
        ctx.fillStyle = visorGrad;
        ctx.beginPath();
        ctx.roundRect(-headR*0.8, headY - headR*0.55, headR*1.6, headR*0.28, headR*0.1);
        ctx.fill();
        // Antenna
        ctx.strokeStyle = '#00c8ff';
        ctx.lineWidth = lw * 0.45;
        ctx.beginPath();
        ctx.moveTo(headR*0.3, headY - headR*1.25);
        ctx.lineTo(headR*0.5, headY - headR*2.1);
        ctx.stroke();
        ctx.fillStyle = '#f5c842';
        ctx.beginPath();
        ctx.arc(headR*0.5, headY - headR*2.1, headR*0.18, 0, Math.PI*2);
        ctx.fill();
      }
      break;
    }
    case 'bow': { // Hunter
      if(tier === 0) {
        // T0: Pointed green hood
        ctx.fillStyle = '#556B2F';
        ctx.beginPath();
        ctx.moveTo(-headR*0.9, headY - headR*0.1);
        ctx.quadraticCurveTo(-headR*0.1, headY - headR*2.2, headR*0.4, headY - headR*0.3);
        ctx.arc(0, headY, headR*1.0, -0.3, Math.PI+0.1, true);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      } else if(tier === 1) {
        // T1: Hood with golden clasp + leaf decoration
        ctx.fillStyle = '#4a5e28';
        ctx.beginPath();
        ctx.moveTo(-headR*0.9, headY - headR*0.1);
        ctx.quadraticCurveTo(-headR*0.1, headY - headR*2.3, headR*0.4, headY - headR*0.3);
        ctx.arc(0, headY, headR*1.0, -0.3, Math.PI+0.1, true);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Golden trim edge
        ctx.strokeStyle = '#c8a820';
        ctx.lineWidth = lw * 0.45;
        ctx.beginPath();
        ctx.moveTo(-headR*0.85, headY - headR*0.1);
        ctx.quadraticCurveTo(-headR*0.05, headY - headR*2.2, headR*0.35, headY - headR*0.3);
        ctx.stroke();
        // Leaf pin
        ctx.fillStyle = '#7ec850';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.4;
        ctx.beginPath();
        ctx.ellipse(headR*0.15, headY - headR*0.65, headR*0.28, headR*0.15, -0.5, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
      } else if(tier === 2) {
        // T2: War ranger helm with feather plume
        ctx.fillStyle = '#3d5218';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.7;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.12, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        // Wide brim
        ctx.fillStyle = '#2e3d12';
        ctx.beginPath();
        ctx.ellipse(0, headY - headR*0.2, headR*1.5, headR*0.28, 0, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
        // Feather plume (left side)
        ctx.strokeStyle = '#c8a820';
        ctx.lineWidth = lw * 0.5;
        for(let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(-headR*0.3 - i*headR*0.18, headY - headR*1.1);
          ctx.quadraticCurveTo(-headR*0.9 - i*headR*0.2, headY - headR*2.0, -headR*0.6 - i*headR*0.2, headY - headR*2.4);
          ctx.stroke();
        }
      } else {
        // T3: Divine ranger crown with wing motif
        ctx.fillStyle = '#1e3a0a';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.8;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.2, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        // Gold crown band
        ctx.fillStyle = '#c8a820';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.55;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.05, headR*1.15, Math.PI+0.1, -0.1);
        ctx.lineWidth = lw * 1.1;
        ctx.strokeStyle = '#c8a820';
        ctx.stroke();
        // Left wing sweep
        ctx.strokeStyle = '#7ec850';
        ctx.lineWidth = lw * 0.6;
        ctx.globalAlpha = 0.9;
        for(let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(-headR*0.2, headY - headR*1.1);
          ctx.quadraticCurveTo(-headR*(1.2+i*0.3), headY - headR*(1.4+i*0.2), -headR*(1.0+i*0.4), headY - headR*(2.1+i*0.1));
          ctx.stroke();
        }
        // Right wing sweep
        for(let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.moveTo(headR*0.2, headY - headR*1.1);
          ctx.quadraticCurveTo(headR*(1.2+i*0.3), headY - headR*(1.4+i*0.2), headR*(1.0+i*0.4), headY - headR*(2.1+i*0.1));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        // Center jewel
        ctx.fillStyle = '#4ecca3';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.4;
        ctx.beginPath();
        ctx.arc(0, headY - headR*1.15, headR*0.22, 0, Math.PI*2);
        ctx.fill(); ctx.stroke();
      }
      break;
    }
    case 'rifle': { // Soldier
      if(tier === 0) {
        // T0: Military helmet
        ctx.fillStyle = '#556B2F';
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.15, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        ctx.strokeStyle = '#3d4f2f';
        ctx.lineWidth = lw * 0.5;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.2, Math.PI+0.3, -0.3);
        ctx.stroke();
      } else if(tier === 1) {
        // T1: Helmet + camo stripes
        ctx.fillStyle = '#556B2F';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.7;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.15, Math.PI, 2*Math.PI);

        ctx.strokeStyle = '#3d4f2f';
        ctx.lineWidth = lw * 0.5;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.2, Math.PI+0.3, -0.3);
        ctx.stroke();
        // Camo dots
        ctx.fillStyle = '#3d4f2f';
        ctx.beginPath(); ctx.arc(-headR*0.3, headY - headR*0.8, headR*0.18, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(headR*0.45, headY - headR*0.55, headR*0.14, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(headR*0.1, headY - headR*1.1, headR*0.12, 0, Math.PI*2); ctx.fill();
        // Rank stripe
        ctx.strokeStyle = '#f5c842';
        ctx.lineWidth = lw * 0.4;
        ctx.beginPath();
        ctx.moveTo(-headR*0.5, headY - headR*0.05);
        ctx.lineTo(headR*0.5, headY - headR*0.05);
        ctx.stroke();
      } else if(tier === 2) {
        // T2: Full tactical helmet with face visor
        ctx.fillStyle = '#334433';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.75;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.15, headR*1.2, Math.PI, 2*Math.PI);

        ctx.lineWidth = lw * 0.55;
        ctx.beginPath();
        ctx.arc(0, headY, headR*1.05, Math.PI+0.15, -0.15);
        ctx.lineTo(headR*1.0, headY - headR*0.15);
        ctx.arc(0, headY - headR*0.15, headR*1.05, -0.15, Math.PI+0.15, true);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Visor tint
        ctx.fillStyle = 'rgba(100,200,80,0.25)';
        ctx.beginPath();
        ctx.arc(0, headY, headR*1.0, Math.PI+0.2, -0.2);
        ctx.lineTo(headR*0.95, headY - headR*0.15);
        ctx.arc(0, headY - headR*0.15, headR*1.0, -0.2, Math.PI+0.2, true);
        ctx.closePath();
        ctx.fill();
        // Rank chevrons
        ctx.strokeStyle = '#f5c842';
        ctx.lineWidth = lw * 0.45;
        ctx.beginPath();
        ctx.moveTo(-headR*0.3, headY - headR*1.2); ctx.lineTo(0, headY - headR*1.0); ctx.lineTo(headR*0.3, headY - headR*1.2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-headR*0.3, headY - headR*1.45); ctx.lineTo(0, headY - headR*1.25); ctx.lineTo(headR*0.3, headY - headR*1.45);
        ctx.stroke();
      } else {
        // T3: Power armor helm with glowing HUD eye
        ctx.fillStyle = '#1a2a1a';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.85;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.3, Math.PI, 2*Math.PI);
        ctx.fill(); ctx.stroke();
        // Outer glow rim
        ctx.strokeStyle = '#4ecca3';
        ctx.lineWidth = lw * 0.6;
        ctx.globalAlpha = 0.85;
        ctx.beginPath();
        ctx.arc(0, headY - headR*0.2, headR*1.35, Math.PI, 2*Math.PI);
        ctx.stroke();
        ctx.globalAlpha = 1;
        // Full face shield
        ctx.fillStyle = 'rgba(20,40,20,0.85)';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.6;
        ctx.beginPath();
        ctx.arc(0, headY + headR*0.1, headR*1.1, Math.PI+0.05, -0.05);
        ctx.lineTo(headR*1.05, headY - headR*0.2);
        ctx.arc(0, headY - headR*0.2, headR*1.1, -0.05, Math.PI+0.05, true);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // HUD eye glow (single center scan line)
        ctx.fillStyle = '#4ecca3';
        ctx.globalAlpha = 0.85;
        ctx.beginPath();
        ctx.roundRect(-headR*0.75, headY - headR*0.3, headR*1.5, headR*0.22, headR*0.08);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Top crest fin
        ctx.fillStyle = '#2a4a2a';
        ctx.strokeStyle = '#4ecca3';
        ctx.lineWidth = lw * 0.4;
        ctx.beginPath();
        ctx.moveTo(-headR*0.15, headY - headR*1.3);
        ctx.lineTo(0, headY - headR*2.1);
        ctx.lineTo(headR*0.15, headY - headR*1.3);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
      }
      break;
    }
    case 'minigun': { // Minigunner
      if(tier === 0) {
        // T0: Red bandana
        ctx.fillStyle = '#c0392b';
        ctx.strokeStyle = '#222';

        ctx.beginPath();
        ctx.arc(headR*0.3, headY - headR*0.82, headR*0.26, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        // Goggle bridge
        ctx.strokeStyle = '#555';
        ctx.lineWidth = lw * 0.3;
        ctx.beginPath();
        ctx.moveTo(-headR*0.04, headY - headR*0.82); ctx.lineTo(headR*0.04, headY - headR*0.82);
        ctx.stroke();
      } else if(tier === 2) {
        // T2: Gas mask + goggles
        ctx.fillStyle = '#333';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.7;
        ctx.beginPath();
        ctx.arc(0, headY, headR*1.08, Math.PI+0.1, -0.1);
        ctx.lineTo(headR*1.02, headY - headR*0.2);
        ctx.arc(0, headY - headR*0.2, headR*1.08, -0.1, Math.PI+0.1, true);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        // Filter canister on chin
        ctx.fillStyle = '#555';
        ctx.strokeStyle = '#222';
        ctx.lineWidth = lw * 0.45;
        ctx.beginPath();
        ctx.roundRect(-headR*0.3, headY + headR*0.45, headR*0.6, headR*0.45, headR*0.12);

        ctx.lineWidth = lw * 0.5;
        ctx.beginPath(); ctx.arc(-headR*0.33, headY - headR*0.25, headR*0.32, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(headR*0.33, headY - headR*0.25, headR*0.32, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        // Red bandana stripe above mask

        }

        ctx.beginPath();

    case 'sniper': { // Sniper
