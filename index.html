    }
  }
}

// ===== BOSS CROWN =====
function drawCrown(headY, headR, s, lw) {
  ctx.fillStyle = '#f5c842';
  ctx.strokeStyle = '#222';
  ctx.lineWidth = lw * 0.6;
  const cy = headY - headR * 0.7;
  const cw = headR * 1.1;
  const ch = headR * 0.7;
  ctx.beginPath();
  ctx.moveTo(-cw, cy);
  ctx.lineTo(-cw, cy - ch*0.6);
  ctx.lineTo(-cw*0.5, cy - ch*0.2);
  ctx.lineTo(0, cy - ch);
  ctx.lineTo(cw*0.5, cy - ch*0.2);
  ctx.lineTo(cw, cy - ch*0.6);
  ctx.lineTo(cw, cy);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Jewel
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(0, cy - ch*0.35, headR*0.15, 0, Math.PI*2);
  ctx.fill();
}

const weaponMap = {
  scout:'pistol', hunter:'bow', soldier:'rifle',
  minigunner:'minigun', sniper:'sniper', rocket:'rpg', freezer:'freeze', engineer:'wrench'
};

function drawPath(level) {
  const path = getPixelPath(level);
  const pathW = Math.max(20, Math.min(W, H) * 0.035);
  
  // Path shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = pathW + 6;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.stroke();
  
  // Path border
  ctx.strokeStyle = shadeColor(level.pathColor, -30);
  ctx.lineWidth = pathW + 2;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.stroke();
  
  // Path fill
  ctx.strokeStyle = level.pathColor;
  ctx.lineWidth = pathW;
  ctx.beginPath();
  ctx.moveTo(path[0].x, path[0].y);
  for(let i = 1; i < path.length; i++) ctx.lineTo(path[i].x, path[i].y);
  ctx.stroke();
  
  // Path details (stones/texture)
  ctx.fillStyle = shadeColor(level.pathColor, -15);
  for(let i = 1; i < path.length; i++) {
    let dx = path[i].x - path[i-1].x;
    let dy = path[i].y - path[i-1].y;
    let len = Math.sqrt(dx*dx+dy*dy);
    let steps = Math.floor(len / 25);
    for(let j = 0; j < steps; j++) {
      let t = (j + 0.5) / steps;
      let px = path[i-1].x + dx*t + (Math.sin(j*7.3)*4);
      let py = path[i-1].y + dy*t + (Math.cos(j*5.1)*4);
      ctx.beginPath();
      ctx.arc(px, py, 2 + Math.sin(j*3)*1, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  // Entry/exit arrows
  ctx.fillStyle = '#4ecca3';
  drawArrow(path[0].x, path[0].y, path[1].x, path[1].y, 12);
  ctx.fillStyle = '#e94560';
  drawArrow(path[path.length-2].x, path[path.length-2].y, path[path.length-1].x, path[path.length-1].y, 12);
}

function drawArrow(x1, y1, x2, y2, size) {
  let a = Math.atan2(y2-y1, x2-x1);
  ctx.save();
  ctx.translate(x1, y1);
  ctx.rotate(a);
  ctx.beginPath();
  ctx.moveTo(size, 0);
  ctx.lineTo(-size/2, -size*0.7);
  ctx.lineTo(-size/2, size*0.7);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function shadeColor(color, percent) {
  let num = parseInt(color.replace("#",""), 16);
  let r = Math.min(255, Math.max(0, (num >> 16) + percent));
  let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  let b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return "#" + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

// ===== LEVEL RENDERING =====
function drawBackground(level) {
  const area = getGameArea();
  
  // Ground gradient
  const grd = ctx.createLinearGradient(0, area.y, 0, area.y + area.h);
  grd.addColorStop(0, level.color);
  grd.addColorStop(1, shadeColor(level.color, -20));
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
  
  // Decorative elements
  const seed = level.name.length * 137;
  ctx.fillStyle = shadeColor(level.color, 15);
  for(let i = 0; i < 30; i++) {
    let px = ((seed + i*97) % 1000) / 1000 * W;
    let py = area.y + ((seed + i*53) % 1000) / 1000 * area.h;
    let r = 2 + (i % 4);
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(px, py, r, 0, Math.PI*2);
    ctx.fill();
  }
  // flowers/details
  ctx.globalAlpha = 0.5;
  for(let i = 0; i < 15; i++) {
    let px = ((seed + i*131) % 1000) / 1000 * W;
    let py = area.y + ((seed + i*79) % 1000) / 1000 * area.h;
    drawFlower(px, py, 4 + i%3, level.color);
  }
  ctx.globalAlpha = 1;
}

function drawFlower(x, y, r, base) {
  const colors = ['#ff6b8a','#fff176','#ba68c8','#4fc3f7','#fff'];
  ctx.fillStyle = colors[Math.floor(x+y) % colors.length];
  for(let i = 0; i < 5; i++) {
    let a = i * Math.PI*2/5;
    ctx.beginPath();
    ctx.arc(x + Math.cos(a)*r*0.6, y + Math.sin(a)*r*0.6, r*0.4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath();
  ctx.arc(x, y, r*0.3, 0, Math.PI*2);
  ctx.fill();
}

// ===== DRAG-TO-PLACE SYSTEM =====
// State: dragging holds {type, x, y} while user drags from hotbar onto map
let dragging = null;
let dragGhost = null; // floating DOM element that follows cursor during drag

function getPointerPos(e) {
  const t = e.touches ? e.touches[0] : e;
  return { x: t.clientX, y: t.clientY };
}

function createDragGhost(def) {
  if(dragGhost) dragGhost.remove();
  const el = document.createElement('div');
  el.id = 'dragGhost';
  el.style.cssText = `position:fixed;pointer-events:none;z-index:9999;
    width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:1.8rem;background:${def.color}44;border:2px solid ${def.color};
    box-shadow:0 4px 20px rgba(0,0,0,0.5);transform:translate(-50%,-50%) scale(1.1);
    transition:transform 0.1s;`;
  el.textContent = getUnitEmoji(def.id);
  document.body.appendChild(el);
  dragGhost = el;
}

function startDrag(defId, e) {
  if(gameState !== 'playing') return;
  const def = TOWER_DEFS.find(d => d.id === defId);
  if(!def || coins < def.cost) return;
  e.preventDefault();
  
  const pos = getPointerPos(e);
  dragging = { type: defId, x: pos.x, y: pos.y };
  selectedTowerType = defId;
  placingTower = { type: defId, x: pos.x, y: pos.y };
  
  createDragGhost(def);
  dragGhost.style.left = pos.x + 'px';
  dragGhost.style.top = pos.y + 'px';
  
  document.querySelectorAll('.unit-slot').forEach(s => s.classList.remove('selected'));
  const slot = document.querySelector(`.unit-slot[data-id="${defId}"]`);
  if(slot) slot.classList.add('selected');
  
  deselectUnit(); // close upgrade panel if open
}

function onDragMove(e) {
  const pos = getPointerPos(e);
  mouseX = pos.x;
  mouseY = pos.y;
  
  if(dragging) {
    e.preventDefault();
    dragging.x = pos.x;
    dragging.y = pos.y;
    // Update canvas coordinates
    const rect = canvas.getBoundingClientRect();
    placingTower = { type: dragging.type, x: pos.x - rect.left, y: pos.y - rect.top };
    
    if(dragGhost) {
      dragGhost.style.left = pos.x + 'px';
      dragGhost.style.top = pos.y + 'px';
      // Color ghost based on validity
      const path = currentLevel ? getPixelPath(currentLevel) : [];
      const valid = currentLevel && canPlace(placingTower.x, placingTower.y, path) && coins >= TOWER_DEFS.find(d=>d.id===dragging.type).cost;
      dragGhost.style.borderColor = valid ? '#4ecca3' : '#e94560';
      dragGhost.style.background = valid ? 'rgba(78,204,163,0.3)' : 'rgba(233,69,96,0.3)';
    }
  }
}

function onDragEnd(e) {
  if(dragging && currentLevel) {
    const rect = canvas.getBoundingClientRect();
    const cx = dragging.x - rect.left;
    const cy = dragging.y - rect.top;
    const path = getPixelPath(currentLevel);
    const def = TOWER_DEFS.find(d => d.id === dragging.type);
    
    if(def && canPlace(cx, cy, path) && coins >= def.cost) {
      coins -= def.cost;
      towers.push({
        x: cx, y: cy,
        type: def.id, level: 1,
        dmg: def.dmg, range: def.range, fireRate: def.fireRate,
        fireCooldown: 0, angle: 0,
        color: def.color, projSpeed: def.projSpeed, projColor: def.projColor,
        splash: def.splash || 0, slow: def.slow || 0,
        kills: 0,
        turretTimer: def.turretInterval || 0
      });
      // Apply any global type upgrades already purchased
      applyTypeUpgrades(towers[towers.length - 1]);
      updateCoinsUI();
      
      // Place particles
      for(let i = 0; i < 10; i++) {
        particles.push({
          x: cx, y: cy,
          vx: (Math.random()-0.5)*80,
          vy: (Math.random()-0.5)*80,
          life: 0.5, maxLife: 0.5,
          color: def.color, radius: 3
        });
      }
    }
  }
  
  // Clean up drag state
  dragging = null;
  placingTower = null;
  selectedTowerType = null;
  document.querySelectorAll('.unit-slot').forEach(s => s.classList.remove('selected'));
  if(dragGhost) { dragGhost.remove(); dragGhost = null; }
}

// Canvas click handler — only for selecting placed towers
function onCanvasClick(e) {
  if(gameState !== 'playing') return;
  if(dragging) return; // don't interfere with drag
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  
  let clicked = null;
  for(let t of towers) {
    let dx = t.x - mx, dy = t.y - my;
    if(Math.sqrt(dx*dx+dy*dy) < 22) { clicked = t; break; }
  }
  if(clicked) {
    selectedPlacedTower = clicked;
    showUpgradePanel(clicked);
  } else {
    deselectUnit();
  }
}

// Attach global document-level listeners for drag (these work across hotbar→canvas)
document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup', onDragEnd);
document.addEventListener('touchmove', e => { onDragMove(e); }, {passive:false});
document.addEventListener('touchend', e => { onDragEnd(e); });
document.addEventListener('touchcancel', e => { onDragEnd(e); });

// Tower selection — must be on #gameUI (not canvas) because gameUI sits on
// top of the canvas and intercepts all pointer events in the play area.
const UI_SELECTORS = '#upgradePanel, #hotbar, #topBar, #startWaveBtn, #speedBtn';
const gameUIEl = document.getElementById('gameUI');

gameUIEl.addEventListener('click', e => {
  if(gameState !== 'playing' || dragging) return;
  if(e.target.closest(UI_SELECTORS)) return; // let UI buttons handle themselves
  onCanvasClick(e);
});

gameUIEl.addEventListener('touchstart', e => {
  if(gameState !== 'playing' || dragging) return;
  if(e.target.closest(UI_SELECTORS)) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = touch.clientX - rect.left;
  const my = touch.clientY - rect.top;
  let clicked = null;
  for(let tw of towers) {
    let dx = tw.x - mx, dy = tw.y - my;
    if(Math.sqrt(dx*dx+dy*dy) < 22) { clicked = tw; break; }
  }
  if(clicked) {
    selectedPlacedTower = clicked;
    showUpgradePanel(clicked);
  } else {
    deselectUnit();
  }
}, {passive:true});

// ===== HOTBAR =====
function buildHotbar() {
  const bar = document.getElementById('hotbar');
  bar.innerHTML = '';
  TOWER_DEFS.forEach(def => {
    const slot = document.createElement('div');
    slot.className = 'unit-slot';
    slot.dataset.id = def.id;
    slot.innerHTML = `
      <div class="unit-icon" style="background:${def.color}22;border:2px solid ${def.color};">
        <span style="font-size:1.2rem;">${getUnitEmoji(def.id)}</span>
      </div>
      <span class="unit-cost">$${def.cost}</span>
      <span class="unit-name">${def.name}</span>
    `;
    // Mouse drag start
    slot.addEventListener('mousedown', e => { startDrag(def.id, e); });
    // Touch drag start
    slot.addEventListener('touchstart', e => { startDrag(def.id, e); }, {passive:false});
    bar.appendChild(slot);
  });
}

function getUnitEmoji(id) {
  const map = {scout:'🏃', hunter:'🏹', soldier:'🔫', minigunner:'⚡', sniper:'🎯', rocket:'🚀', freezer:'❄️', engineer:'🔧'};
  return map[id] || '👤';
}

// ===== UPGRADE PANEL =====
function showUpgradePanel(tower) {
  if(!tower) return;
  const panel = document.getElementById('upgradePanel');
  const def = TOWER_DEFS.find(d => d.id === tower.type);
  const up = typeUpgrades[tower.type] || { dmg: 0, range: 0, rate: 0, prestige: 0 };
  panel.style.display = 'block';

  document.getElementById('upIcon').textContent = getUnitEmoji(tower.type);
  document.getElementById('upName').textContent = def.name;
  document.getElementById('upDmg').textContent  = tower.dmg.toFixed(0);
  document.getElementById('upRng').textContent  = Math.floor(tower.range);
  document.getElementById('upSpd').textContent  = (1 / tower.fireRate).toFixed(1) + '/s';

  // Prestige tier indicator next to name
  const tierLabels = ['', ' ◆', ' ◆◆', ' ◆◆◆'];
  document.getElementById('upName').textContent = def.name + (tierLabels[up.prestige] || '');

  // Sell value
  document.querySelector('.sell-btn').textContent = `Sell Unit - $${Math.floor(def.cost * 0.6)}`;

  // Helper: set one stat upgrade button
  function setBtn(id, stat, label) {
    const btn = document.getElementById(id);
    const lvl = up[stat];
    if(lvl >= MAX_STAT_LEVEL) {
      btn.textContent = `${label} — MAX`;
      btn.disabled = true;
    } else {
      const cost = STAT_UP_COSTS[lvl];
      btn.textContent = `${label}  Lv.${lvl}→${lvl+1}  $${cost}`;
      btn.disabled = coins < cost;
    }
  }
  setBtn('upDmgBtn',   'dmg',   '⚔ Damage');
  setBtn('upRangeBtn', 'range', '📡 Range');
  setBtn('upRateBtn',  'rate',  '⚡ Fire Rate');

  // Prestige button
  const prestigeBtn = document.getElementById('upPrestigeBtn');
  const prestigeSection = document.getElementById('upPrestigeSection');
  const totalStatUps = up.dmg + up.range + up.rate;
  const needed = PRESTIGE_UNLOCK_THRESHOLD - totalStatUps;

  if(up.prestige >= MAX_PRESTIGE_LEVEL) {
    prestigeSection.style.display = 'block';
    prestigeBtn.textContent = '✦ Evolution — MAXED';
    prestigeBtn.disabled = true;
  } else if(totalStatUps < PRESTIGE_UNLOCK_THRESHOLD) {
    prestigeSection.style.display = 'block';
    prestigeBtn.textContent = `✦ Evolution — 🔒 Need ${needed} more upgrade${needed>1?'s':''}`;
    prestigeBtn.disabled = true;
  } else {
    prestigeSection.style.display = 'block';
    const cost = PRESTIGE_COSTS[up.prestige];
    const tierName = ['I','II','III'][up.prestige];
    prestigeBtn.textContent = `✦ Evolution ${tierName}  $${cost}`;
    prestigeBtn.disabled = coins < cost;
  }
}

function upgradeTypeStat(stat) {
  if(!selectedPlacedTower) return;
  const type = selectedPlacedTower.type;
  const up = typeUpgrades[type];
  if(up[stat] >= MAX_STAT_LEVEL) return;

  const cost = STAT_UP_COSTS[up[stat]];
  if(coins < cost) return;

  coins -= cost;
  up[stat]++;

  // Apply to ALL existing towers of this type
  for(const t of towers) {
    if(t.type === type) applyTypeUpgrades(t);
  }

  updateCoinsUI();

  // Particle burst on selected tower
  const t = selectedPlacedTower;
  const color = stat === 'dmg' ? '#e74c3c' : stat === 'range' ? '#4ecca3' : '#3498db';
  for(let i = 0; i < 15; i++) {
    particles.push({
      x: t.x, y: t.y,
      vx: (Math.random()-0.5)*120,
      vy: (Math.random()-0.5)*120,
      life: 0.7, maxLife: 0.7,
      color, radius: 3
    });
  }

  showUpgradePanel(selectedPlacedTower);
}

function upgradePrestige() {
  if(!selectedPlacedTower) return;
  const type = selectedPlacedTower.type;
  const up = typeUpgrades[type];
  if(up.prestige >= MAX_PRESTIGE_LEVEL) return;

  const totalStatUps = up.dmg + up.range + up.rate;
  if(totalStatUps < PRESTIGE_UNLOCK_THRESHOLD) return;

  const cost = PRESTIGE_COSTS[up.prestige];
  if(coins < cost) return;

  coins -= cost;
  up.prestige++;

  for(const t of towers) {
    if(t.type === type) applyTypeUpgrades(t);
  }

  updateCoinsUI();

  // Big gold + color particle burst
  const t = selectedPlacedTower;
  const burstColors = ['#f5c842','#ff6b35','#e94560','#4ecca3','#00d2ff'];
  for(let i = 0; i < 40; i++) {
    particles.push({
      x: t.x, y: t.y,
      vx: (Math.random()-0.5)*220,
      vy: (Math.random()-0.5)*220,
      life: 1.4, maxLife: 1.4,
      color: burstColors[Math.floor(Math.random()*burstColors.length)],
      radius: 4 + Math.random()*3
    });
  }

  showUpgradePanel(selectedPlacedTower);
}

function sellSelected() {
  if(!selectedPlacedTower) return;
  const t = selectedPlacedTower;
  const def = TOWER_DEFS.find(d => d.id === t.type);
  coins += Math.floor(def.cost * 0.6);
  towers = towers.filter(tw => tw !== t);
  deselectUnit();
  updateCoinsUI();
}

function deselectUnit() {
  selectedPlacedTower = null;
  document.getElementById('upgradePanel').style.display = 'none';
}

// ===== WAVE SYSTEM =====
function startNextWave() {
  if(waveActive) return;
  wave++;
  if(wave > maxWaves) return;
  waveActive = true;
  document.getElementById('startWaveBtn').style.display = 'none';
  
  const enemyList = generateWaveEnemies(wave, difficulty);
  spawnQueue = enemyList;
  spawnTimer = 0;
  
  // Announce
  const el = document.getElementById('waveAnnounce');
  el.textContent = `Wave ${wave}`;
  el.style.opacity = '1';
  waveAnnounceTimer = 2;
  
  updateWaveUI();
}

function spawnEnemy(data) {
  const path = getPixelPath(currentLevel);
  const pos = getPosOnPath(path, 0);
  enemies.push({
    x: pos.x, y: pos.y,
    dist: 0,
    hp: data.hp, maxHp: data.hp,
    speed: data.speed,
    baseSpeed: data.speed,
    radius: data.radius,
    color: data.color,
    reward: data.reward,
    bodyType: data.bodyType,
    slowTimer: 0
  });
}

// ===== GAME LOGIC UPDATE =====
function updateGame(dt) {
  if(gameState !== 'playing') return;
  
  dt *= gameSpeed;
  gameTime += dt;
  
  // Announce timer
  if(waveAnnounceTimer > 0) {
    waveAnnounceTimer -= dt;
    if(waveAnnounceTimer <= 0) {
      document.getElementById('waveAnnounce').style.opacity = '0';
    }
  }
  
  // Spawn enemies
  if(spawnQueue.length > 0) {
    spawnTimer -= dt;
    if(spawnTimer <= 0) {
      const next = spawnQueue.shift();
      spawnEnemy(next);
      spawnTimer = next.delay || 0.5;
    }
  }
  
  const path = getPixelPath(currentLevel);
  const totalLen = getPathLength(path);
  
  // Update enemies
  for(let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    
    // Slow effect
    if(e.slowTimer > 0) {
      e.slowTimer -= dt;
      e.speed = e.baseSpeed * 0.4;
    } else {
      e.speed = e.baseSpeed;
    }
    
    e.dist += e.speed * dt;
    const pos = getPosOnPath(path, e.dist);
    e.x = pos.x;
    e.y = pos.y;
    e.angle = pos.angle;
    
    if(e.dist >= totalLen) {
      enemies.splice(i, 1);
      lives--;
      updateLivesUI();
      if(lives <= 0) {
        gameOver(false);
        return;
      }
    }
  }
  
  // Update towers
  for(let t of towers) {
    t.fireCooldown -= dt;
    
    // Find target
    let target = null;
    let bestDist = -1;
    for(let e of enemies) {
      let dx = e.x - t.x, dy = e.y - t.y;
      let d = Math.sqrt(dx*dx + dy*dy);
      if(d <= t.range && e.dist > bestDist) {
        target = e;
        bestDist = e.dist;
      }
    }
    
    if(target) {
      t.angle = Math.atan2(target.y - t.y, target.x - t.x);
      
      if(t.fireCooldown <= 0) {
        t.fireCooldown = t.fireRate;
        
        // Create projectile
        projectiles.push({
          x: t.x + Math.cos(t.angle)*15,
          y: t.y + Math.sin(t.angle)*15,
          vx: Math.cos(t.angle) * t.projSpeed,
          vy: Math.sin(t.angle) * t.projSpeed,
          dmg: t.dmg,
          color: t.projColor,
          splash: t.splash,
          slow: t.slow,
          owner: t,
          life: 3,
          radius: t.splash ? 5 : 3
        });
      }
    }
  }
  
  // Engineer: spawn turrets on either side
  for(let t of towers) {
    if(t.type !== 'engineer') continue;
    t.turretTimer -= dt;
    if(t.turretTimer <= 0) {
      t.turretTimer = 10;
      const dist = 42;
      // Try pairs of opposite directions until both sides are placeable
      const pairs = [0, Math.PI/4, Math.PI/2, 3*Math.PI/4];
      for(let baseAng of pairs) {
        const ax = t.x + Math.cos(baseAng) * dist;
        const ay = t.y + Math.sin(baseAng) * dist;
        const bx = t.x + Math.cos(baseAng + Math.PI) * dist;
        const by = t.y + Math.sin(baseAng + Math.PI) * dist;
        const aOk = canPlace(ax, ay, path);
        const bOk = canPlace(bx, by, path);
        if(aOk || bOk) {
          const dmg = 8 + (t.level - 1) * 2;
          if(aOk) turrets.push({ x: ax, y: ay, life: 20, maxLife: 20, fireCooldown: 0, angle: 0, range: 110, dmg, fireRate: 0.6, projSpeed: 350 });
          if(bOk) turrets.push({ x: bx, y: by, life: 20, maxLife: 20, fireCooldown: 0, angle: 0, range: 110, dmg, fireRate: 0.6, projSpeed: 350 });
          break;
        }
      }
    }
  }

  // Update turrets
  for(let i = turrets.length - 1; i >= 0; i--) {
    const t = turrets[i];
    t.life -= dt;
    if(t.life <= 0) { turrets.splice(i, 1); continue; }
    t.fireCooldown -= dt;

    let target = null, bestDist = -1;
    for(let e of enemies) {
      const dx = e.x - t.x, dy = e.y - t.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d <= t.range && e.dist > bestDist) { target = e; bestDist = e.dist; }
    }
    if(target) {
      t.angle = Math.atan2(target.y - t.y, target.x - t.x);
      if(t.fireCooldown <= 0) {
        t.fireCooldown = t.fireRate;
        projectiles.push({
          x: t.x + Math.cos(t.angle)*12,
          y: t.y + Math.sin(t.angle)*12,
          vx: Math.cos(t.angle) * t.projSpeed,
          vy: Math.sin(t.angle) * t.projSpeed,
          dmg: t.dmg, color: '#ffd700',
          splash: 0, slow: 0,
          owner: t, life: 3, radius: 3
        });
      }
    }
  }

  // Update projectiles
  for(let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    
    if(p.life <= 0 || p.x < -50 || p.x > W+50 || p.y < -50 || p.y > H+50) {
      projectiles.splice(i, 1);
      continue;
    }
    
    // Check hit
    for(let e of enemies) {
      let dx = e.x - p.x, dy = e.y - p.y;
      let d = Math.sqrt(dx*dx + dy*dy);
      if(d < e.radius + p.radius) {
        // Hit!
        if(p.splash > 0) {
          // Splash damage
          for(let e2 of enemies) {
            let dx2 = e2.x - p.x, dy2 = e2.y - p.y;
            if(Math.sqrt(dx2*dx2+dy2*dy2) < p.splash) {
              damageEnemy(e2, p.dmg, p.owner);
              if(p.slow) e2.slowTimer = 2;
            }
          }
          // Splash effect
          for(let k = 0; k < 10; k++) {
            particles.push({
              x: p.x, y: p.y,
              vx: (Math.random()-0.5)*150,
              vy: (Math.random()-0.5)*150,
              life: 0.5, maxLife: 0.5,
              color: p.color, radius: 3
            });
          }
        } else {
          damageEnemy(e, p.dmg, p.owner);
          if(p.slow) e.slowTimer = 2;
        }
        
        // Hit particles
        for(let k = 0; k < 4; k++) {
          particles.push({
            x: p.x, y: p.y,
            vx: (Math.random()-0.5)*80,
            vy: (Math.random()-0.5)*80,
            life: 0.3, maxLife: 0.3,
            color: p.color, radius: 2
          });
        }
        
        projectiles.splice(i, 1);
        break;
      }
    }
  }
  
  // Clean dead enemies
  for(let i = enemies.length - 1; i >= 0; i--) {
    if(enemies[i].hp <= 0) {
      const e = enemies[i];
      coins += e.reward;
      updateCoinsUI();
      
      // Death particles
      for(let k = 0; k < 12; k++) {
        particles.push({
          x: e.x, y: e.y,
          vx: (Math.random()-0.5)*120,
          vy: (Math.random()-0.5)*120,
          life: 0.6, maxLife: 0.6,
          color: e.color, radius: 3
        });
      }
      // Coin popup
      particles.push({
        x: e.x, y: e.y - 10,
        vx: 0, vy: -40,
        life: 1, maxLife: 1,
        text: `+$${e.reward}`,
        color: '#f5c842', radius: 0
      });
      
      enemies.splice(i, 1);
    }
  }
  
  // Update particles
  for(let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= dt;
    if(p.life <= 0) particles.splice(i, 1);
  }
  
  // Check wave complete
  if(waveActive && spawnQueue.length === 0 && enemies.length === 0) {
    waveActive = false;
    if(wave >= maxWaves) {
      gameOver(true);
    } else {
      document.getElementById('startWaveBtn').style.display = 'block';
    }
  }
  
  // Update hotbar affordability
  document.querySelectorAll('.unit-slot').forEach(slot => {
    const def = TOWER_DEFS.find(d => d.id === slot.dataset.id);
    if(def) {
      slot.classList.toggle('locked', coins < def.cost);
    }
  });
}

function damageEnemy(e, dmg, tower) {
  e.hp -= dmg;
  if(e.hp <= 0 && tower) tower.kills++;
}

// ===== RENDER =====
function render() {
  ctx.clearRect(0, 0, W, H);
  
  if(gameState !== 'playing') return;
  if(!currentLevel) return;
  
  drawBackground(currentLevel);
  drawPath(currentLevel);
  
  const path = getPixelPath(currentLevel);
  
  // Draw range for selected/placing
  if(selectedPlacedTower) {
    ctx.beginPath();
    ctx.arc(selectedPlacedTower.x, selectedPlacedTower.y, selectedPlacedTower.range, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(78,204,163,0.12)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(78,204,163,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  
  // Draw towers
  for(let t of towers) {
    const sel = t === selectedPlacedTower;
    if(sel) {
      ctx.shadowColor = t.color;
      ctx.shadowBlur = 15;
    }
    
    // Ground shadow (at feet level)
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.ellipse(t.x, t.y + 11, 16, 5, 0, 0, Math.PI*2);
    ctx.fill();
    
    const tPrestige = typeUpgrades[t.type]?.prestige || 0;
    drawStickFigure(t.x, t.y, 12, t.color, t.angle, 'tower', weaponMap[t.type], tPrestige);

    // Level indicator (above head — head is ~20px above origin for r=12)
    const headOffset = 28 + tPrestige * 2;
    if(tPrestige > 0) {
      const prestigeColors = ['', '#c8a820', '#00d2ff', '#e94560'];
      ctx.fillStyle = prestigeColors[tPrestige];
      ctx.font = `bold ${10 + tPrestige}px Outfit`;
      ctx.textAlign = 'center';
      ctx.fillText('◆'.repeat(tPrestige), t.x, t.y - headOffset - 11);
    }
    if(t.level > 1) {
      ctx.fillStyle = '#f5c842';
      ctx.font = 'bold 10px Outfit';
      ctx.textAlign = 'center';
      ctx.fillText('★'.repeat(Math.min(t.level-1, 4)), t.x, t.y - headOffset);
    }
    
    ctx.shadowBlur = 0;
  }
  
  // Draw enemies
  for(let e of enemies) {
    const es = e.radius / 10;
    const eLegLen = e.bodyType === 'heavy' ? 7*es : e.bodyType === 'boss' ? 9*es : e.bodyType === 'thin' ? 7*es : 8*es;
    
    // Ground shadow at feet
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(e.x, e.y + eLegLen + 2, e.radius*0.9, e.radius*0.25, 0, 0, Math.PI*2);
    ctx.fill();
    
    drawStickFigure(e.x, e.y, e.radius, e.color, e.angle || 0, e.bodyType, null);
    
    // HP bar (above head)
    if(e.hp < e.maxHp) {
      const headR2 = e.bodyType==='boss' ? 7.5*es : e.bodyType==='heavy' ? 6*es : e.bodyType==='thin' ? 4*es : 5*es;
      const bodyL2 = e.bodyType==='boss' ? 11*es : e.bodyType==='heavy' ? 10*es : e.bodyType==='thin' ? 7*es : 9*es;
      const headTop = -(2.5*es + bodyL2 + headR2*2);
      const bw = e.radius * 2.5;
      const bh = 3;
      const bx = e.x - bw/2;
      const by = e.y + headTop - 4;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.roundRect(bx-1, by-1, bw+2, bh+2, 2);
      ctx.fill();
      ctx.fillStyle = e.hp/e.maxHp > 0.5 ? '#4ecca3' : e.hp/e.maxHp > 0.25 ? '#f5c842' : '#e94560';
      ctx.beginPath();
      ctx.roundRect(bx, by, bw * (e.hp/e.maxHp), bh, 2);
      ctx.fill();
    }
    
    // Slow indicator
    if(e.slowTimer > 0) {
      ctx.fillStyle = 'rgba(0,210,255,0.2)';
      ctx.beginPath();
      ctx.arc(e.x, e.y - e.radius*0.5, e.radius + 8, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  // Draw engineer turrets
  for(let t of turrets) {
    const alpha = Math.min(1, t.life / 2);
    ctx.globalAlpha = alpha;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(t.x, t.y + 7, 10, 4, 0, 0, Math.PI*2);
    ctx.fill();

    // Base box
    ctx.save();
    ctx.translate(t.x, t.y);
    ctx.fillStyle = '#7d5a0a';
    ctx.fillRect(-8, -6, 16, 12);
    ctx.strokeStyle = '#f39c12';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(-8, -6, 16, 12);
    // Center bolt
    ctx.fillStyle = '#f39c12';
    ctx.beginPath();
    ctx.arc(0, 0, 2.5, 0, Math.PI*2);
    ctx.fill();

    // Rotating barrel
    ctx.rotate(t.angle);
    ctx.fillStyle = '#f39c12';
    ctx.fillRect(2, -2.5, 13, 5);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 1;
    ctx.strokeRect(2, -2.5, 13, 5);
    ctx.restore();

    // Life bar
    const lbw = 24, lbh = 3;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.roundRect(t.x - lbw/2 - 1, t.y - 22, lbw + 2, lbh + 2, 2);
    ctx.fill();
    ctx.fillStyle = t.life / t.maxLife > 0.4 ? '#f39c12' : '#e74c3c';
    ctx.beginPath();
    ctx.roundRect(t.x - lbw/2, t.y - 21, lbw * (t.life / t.maxLife), lbh, 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }

  // Draw projectiles
  for(let p of projectiles) {
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  
  // Draw particles
  for(let p of particles) {
    const alpha = p.life / p.maxLife;
    if(p.text) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.font = 'bold 14px Outfit';
      ctx.textAlign = 'center';
      ctx.fillText(p.text, p.x, p.y);
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI*2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
  
  // Draw placement preview (only while dragging from hotbar)
  if(placingTower && dragging) {
    const def = TOWER_DEFS.find(d => d.id === placingTower.type);
    if(def) {
      const px = placingTower.x;
      const py = placingTower.y;
      const valid = canPlace(px, py, path) && coins >= def.cost;
      
      // Range circle
      ctx.beginPath();
      ctx.arc(px, py, def.range, 0, Math.PI*2);
      ctx.fillStyle = valid ? 'rgba(78,204,163,0.12)' : 'rgba(233,69,96,0.12)';
      ctx.fill();
      ctx.strokeStyle = valid ? 'rgba(78,204,163,0.5)' : 'rgba(233,69,96,0.5)';
      ctx.lineWidth = 2;
      ctx.setLineDash([5,5]);
      ctx.stroke();
      ctx.setLineDash([]);
      
      // Preview figure
      ctx.globalAlpha = 0.7;
      drawStickFigure(px, py, 12, valid ? def.color : '#e94560', 0, 'tower', weaponMap[def.id]);
      ctx.globalAlpha = 1;
    }
  }
}

// ===== GAME LOOP =====
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  
  updateGame(dt);
  render();
  
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// ===== UI FUNCTIONS =====
function updateCoinsUI() {
  document.getElementById('coinsNum').textContent = coins;
}
function updateLivesUI() {
  document.getElementById('livesNum').textContent = lives;
}
function updateWaveUI() {
  document.getElementById('waveNum').textContent = `Wave ${wave}/${maxWaves}`;
}

function showMenu() {
  gameState = 'menu';
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('levelSelect').style.display = 'none';
  document.getElementById('gameUI').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

function showLevelSelect() {
  gameState = 'levelSelect';
  document.getElementById('menu').style.display = 'none';
  document.getElementById('levelSelect').style.display = 'flex';
  buildLevelCards();
}

function buildLevelCards() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  
  LEVELS.forEach((level, idx) => {
    const card = document.createElement('div');
    card.className = 'level-card';
    card.innerHTML = `
      <canvas class="level-preview" data-idx="${idx}" width="400" height="200"></canvas>
      <h3>${level.name}</h3>
      <p>${level.desc}</p>
      <div class="diff-btns">
        <button class="diff-btn easy" data-level="${idx}" data-diff="easy">Easy</button>
        <button class="diff-btn med" data-level="${idx}" data-diff="medium">Medium</button>
        <button class="diff-btn hard" data-level="${idx}" data-diff="hard">Hard</button>
      </div>
    `;
    grid.appendChild(card);
    
    // Draw preview
    setTimeout(() => {
      const cvs = card.querySelector('canvas');
      const pctx = cvs.getContext('2d');
      drawLevelPreview(pctx, level, cvs.width, cvs.height);
    }, 50);
    
    // Difficulty buttons
    card.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        startGame(parseInt(btn.dataset.level), btn.dataset.diff);
      });
    });
  });
}

function drawLevelPreview(ctx, level, w, h) {
  // Background
  ctx.fillStyle = level.color;
  ctx.fillRect(0, 0, w, h);
  
  // Path
  ctx.strokeStyle = level.pathColor;
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  level.path.forEach((p, i) => {
    const px = p.x * w, py = p.y * h;
    if(i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  });
  ctx.stroke();
  
  // Border
  ctx.strokeStyle = shadeColor(level.pathColor, -30);
  ctx.lineWidth = 12;
  ctx.globalCompositeOperation = 'destination-over';
  ctx.beginPath();
  level.path.forEach((p, i) => {
    const px = p.x * w, py = p.y * h;
    if(i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  });
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
}

function startGame(levelIdx, diff) {
  currentLevel = LEVELS[levelIdx];
  difficulty = diff;
  coins = diff === 'easy' ? 800 : diff === 'medium' ? 650 : 500;
  lives = diff === 'easy' ? 25 : diff === 'medium' ? 20 : 15;
  maxWaves = diff === 'easy' ? 10 : diff === 'medium' ? 15 : 20;
  wave = 0;
  enemies = [];
  towers = [];
  turrets = [];
  projectiles = [];
  particles = [];
  initTypeUpgrades();
  spawnQueue = [];
  waveActive = false;
  selectedTowerType = null;
  selectedPlacedTower = null;
  placingTower = null;
  gameSpeed = 1;
  gameTime = 0;
  
  gameState = 'playing';
  document.getElementById('menu').style.display = 'none';
  document.getElementById('levelSelect').style.display = 'none';
  document.getElementById('gameUI').style.display = 'block';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('startWaveBtn').style.display = 'block';
  document.getElementById('speedBtn').textContent = '1x';
  
  buildHotbar();
  updateCoinsUI();
  updateLivesUI();
  updateWaveUI();
  deselectUnit();
}

function gameOver(won) {
  gameState = 'paused';
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'flex';
  document.getElementById('olTitle').textContent = won ? '🎉 Victory!' : '💀 Defeated';
  document.getElementById('olTitle').style.color = won ? 'var(--gold)' : 'var(--accent)';
  document.getElementById('olSub').textContent = won
    ? `Survived all ${maxWaves} waves on ${difficulty}!`
    : `Made it to wave ${wave} on ${difficulty}`;
}

function exitToLevels() {
  gameState = 'levelSelect';
  document.getElementById('gameUI').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
  showLevelSelect();
}

function retryLevel() {
  const idx = LEVELS.indexOf(currentLevel);
  startGame(idx, difficulty);
}

function toggleSpeed() {
  gameSpeed = gameSpeed === 1 ? 2 : gameSpeed === 2 ? 3 : 1;
  document.getElementById('speedBtn').textContent = gameSpeed + 'x';
}

// ===== INIT =====
showMenu();
</script>
